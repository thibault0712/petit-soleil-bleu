<!DOCTYPE html>
<html lang="fr">
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Petit soleil bleu - Prévisions Météo</title>
    <meta name="description" content="Consultez les prévisions météo en temps réel sur Petit soleil bleu. Une interface simple et propre pour suivre le temps qu'il fait dans votre ville.">
    <meta name="keywords" content="météo, prévisions, climat, Petit soleil bleu, météo Vannes, météo France">
    <meta name="author" content="Thibault Falézan">
    <link rel="canonical" href="https://petit-soleil-bleu.thibaultfalezan.com/src/home/home.html">

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://petit-soleil-bleu.thibaultfalezan.com/src/home/home.html">
    <meta property="og:title" content="Petit soleil bleu - Prévisions Météo">
    <meta property="og:description" content="Votre météo quotidienne avec un design épuré.">
    <meta property="og:image" content="https://petit-soleil-bleu.thibaultfalezan.com/assets/icons/android-chrome-512x512.png">

    <!-- JSON-LD Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "Petit soleil bleu",
      "url": "https://petit-soleil-bleu.thibaultfalezan.com",
      "description": "Une application météo responsive simple et propre.",
      "applicationCategory": "WeatherApplication",
      "operatingSystem": "All",
      "author": {
        "@type": "Person",
        "name": "Thibault Falézan",
        "url": "https://thibaultfalezan.com"
      }
    }
    </script>

    <link rel="icon" type="image/x-icon" href="../../assets/icons/favicon.ico">
    <link rel="icon" type="image/png" sizes="16x16" href="../../assets/icons/favicon-16x16.png">
    <link rel="icon" type="image/png" sizes="32x32" href="../../assets/icons/favicon-32x32.png">
    <link rel="apple-touch-icon" sizes="180x180" href="../../assets/icons/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="192x192" href="../../assets/icons/android-chrome-192x192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="../../assets/icons/android-chrome-512x512.png">

    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>
    <script type="text/javascript" src="api/getWeather.js"></script>
    <script type="text/javascript" src="../../config.js"></script>
    <script type="text/javascript" src="views/updatePage.js"></script>
    <script type="text/javascript" src="events/onEnterListener.js" defer></script>
    <script type="text/javascript" src="events/onLoad.js" defer></script>
</head>
<body class="d-flex flex-column min-vh-100 container">

<header class="py-4">
    <nav class="d-flex flex-row justify-content-end gap-2 mb-4">
        <a class="btn btn-primary" href="../home/home.html">Accueil</a>
        <a class="btn btn-outline-primary" href="../about/about.html">À propos</a>
    </nav>

    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6 d-flex gap-2">
            <input type="search" class="form-control form-control-md" id="input-town" name="q" value="Vannes" placeholder="Rechercher une ville" />
            <button class="btn btn-primary btn-lg px-4" onclick='updatePage();'>Chercher</button>
        </div>
    </div>
</header>

<main class="flex-grow-1 d-flex align-items-center">
    <section class="w-100 py-4">
            <div class="card shadow-sm mx-auto overflow-hidden" style="max-width: 800px;">
                <div class="card-body p-5">
                    <div class="text-center mb-4">
                        <h1 class="display-4 fw-bold mb-0" id="header-day">
                            Vendredi
                        </h1>
                    </div>
                    <div class="row align-items-center mb-4">
                        <div class="col text-center">
                            <p class="display-4 fw-bold mb-0" id="header-temperature"> ? </p>
                        </div>
                        <div class="col text-center">
                            <div class="weather-card-header-icon-container">
                                <img id="weather-icon" class="img-fluid" style="width: 120px;" src="../../assets/icons/cloud-not-found.png" alt="Icône météo actuelle"/>
                            </div>
                        </div>
                        <div class="col">
                            <div class="fs-5">
                                <p id="header-humidity" class="mb-1">
                                    Humidité : ?%
                                </p>
                                <p id="header-wind" class="mb-0">
                                    Vent : ?km/h
                                </p>
                            </div>
                        </div>
                    </div>

                    <hr class="my-4">

                    <div class="row g-2 justify-content-around">
                        <div onclick="changeWeatherCardHeader(0)" class="col text-center cursor-pointer p-2 rounded hover-bg-light">
                            <p id="content-day-1" class="fw-bold mb-1">
                                Ven
                            </p>
                            <img id="weather-icon-1" class="img-fluid mb-2" style="width: 60px;" src="../../assets/icons/cloud-not-found.png" alt="Météo jour 1"/>
                            <p id="content-temp-1" class="mb-0">
                                ?
                            </p>
                        </div>
                        <div onclick="changeWeatherCardHeader(1)" class="col text-center cursor-pointer p-2 rounded hover-bg-light">
                            <p id="content-day-2" class="fw-bold mb-1">
                                Ven
                            </p>
                            <img id="weather-icon-2" class="img-fluid mb-2" style="width: 60px;" src="../../assets/icons/cloud-not-found.png" alt="Météo jour 2"/>
                            <p id="content-temp-2" class="mb-0">
                                ?
                            </p>
                        </div>
                        <div onclick="changeWeatherCardHeader(2)" class="col text-center cursor-pointer p-2 rounded hover-bg-light">
                            <p id="content-day-3" class="fw-bold mb-1">
                                Ven
                            </p>
                            <img id="weather-icon-3" class="img-fluid mb-2" style="width: 60px;" src="../../assets/icons/cloud-not-found.png" alt="Météo jour 3"/>
                            <p id="content-temp-3" class="mb-0">
                                ?
                            </p>
                        </div>
                        <div onclick="changeWeatherCardHeader(3)" class="col text-center cursor-pointer p-2 rounded hover-bg-light">
                            <p id="content-day-4" class="fw-bold mb-1">
                                Ven
                            </p>
                            <img id="weather-icon-4" class="img-fluid mb-2" style="width: 60px;" src="../../assets/icons/cloud-not-found.png" alt="Météo jour 4"/>
                            <p id="content-temp-4" class="mb-0">
                                ?
                            </p>
                        </div>
                        <div onclick="changeWeatherCardHeader(4)" class="col text-center cursor-pointer p-2 rounded hover-bg-light">
                            <p id="content-day-5" class="fw-bold mb-1">
                                Ven
                            </p>
                            <img id="weather-icon-5" class="img-fluid mb-2" style="width: 60px;" src="../../assets/icons/cloud-not-found.png" alt="Météo jour 5"/>
                            <p id="content-temp-5" class="mb-0">
                                ?
                            </p>
                        </div>
                    </div>
                </div>
            </div>
    </section>
</main>

<footer class="py-4">
    <p class="text-center text-muted mb-0">
        Copyright © 2026 T.Falézan
    </p>
</footer>

<style>
    .cursor-pointer { cursor: pointer; }
    .hover-bg-light:hover { background-color: #f8f9fa; }
</style>
</body>
</html>
